# 429chain Production Docker Compose
# Includes nginx reverse proxy with HTTPS termination
#
# Setup:
#   1. Place SSL certs in ./nginx/ssl/ (fullchain.pem + privkey.pem)
#      Or use Let's Encrypt: see docs/DEPLOY-DIGITALOCEAN.md
#   2. Copy config/config.example.yaml to config/config.yaml and configure
#   3. docker compose -f docker-compose.prod.yml up -d
#
# Self-signed certs for testing:
#   mkdir -p nginx/ssl
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout nginx/ssl/privkey.pem -out nginx/ssl/fullchain.pem \
#     -subj "/CN=localhost"

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: 429chain:latest
    container_name: 429chain-proxy
    init: true
    expose:
      - "3429"
    volumes:
      - data:/app/data
      - ./config/config.yaml:/app/config/config.yaml
    environment:
      - NODE_ENV=production
      - CONFIG_PATH=/app/config/config.yaml
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3429/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: 429chain-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
    driver: local
  certbot-webroot:
    driver: local
