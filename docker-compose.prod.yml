# 429chain Production Docker Compose
# Includes nginx reverse proxy (SSL terminated by Cloudflare)
#
# Setup:
#   1. Copy config/config.example.yaml to config/config.yaml and configure
#   2. docker compose -f docker-compose.prod.yml up -d
#
# Cloudflare DNS: A record for proxy.everydaychef.io → droplet IP (proxied)

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: 429chain:latest
    container_name: 429chain-proxy
    init: true
    expose:
      - "3429"
    volumes:
      - data:/app/data
      - ./config/config.yaml:/app/config/config.yaml
    environment:
      - NODE_ENV=production
      - CONFIG_PATH=/app/config/config.yaml
    env_file:
      - path: ./.env
        required: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3429/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: 429chain-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  data:
    driver: local
